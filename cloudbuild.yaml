steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=1
      - --concurrency=80
      - --timeout=3600
      - --set-env-vars=NODE_ENV=production,APP_ENV=${_APP_ENV},PRODUCTION_URL=${_PRODUCTION_URL},TESTING_URL=${_TESTING_URL},EXTERNAL_PCK_URL=${_EXTERNAL_PCK_URL}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID

substitutions:
  _REGION: us-central1
  _ARTIFACT_REPOSITORY: parish-simulator
  _SERVICE_NAME: parish-simulator
  _APP_ENV: production
  _PRODUCTION_URL: ''
  _TESTING_URL: ''
  _EXTERNAL_PCK_URL: ''

options:
  logging: CLOUD_LOGGING_ONLY
